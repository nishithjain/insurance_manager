[pytest]
# Backend-only test config. The frontend has its own toolchain.
#
# pythonpath = backend  → makes ``import server``, ``import deps``, etc. work
# regardless of the directory pytest is launched from. Without this, tests can
# only run from inside backend/, which is fine on a dev box but breaks CI from
# the repo root.
pythonpath = backend
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Quieter output for the common case; ``-v`` re-enables verbose locally.
addopts = -ra

# A handful of upstream libs (anyio, aiosqlite) emit DeprecationWarnings on
# Windows that we can't fix from here. Don't fail on them.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
